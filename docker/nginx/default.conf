resolver 127.0.0.11 ipv6=off valid=30s;

upstream php_backend {
    zone php_backend 64k;
    server app:9000 resolve;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 256m;
    fastcgi_read_timeout 600;
    send_timeout 600;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location ~* ^/(?:application|system|ci|docker)(?:/|$) {
        deny all;
    }

    location ~* ^/assets/backup_db(?:/|$) {
        deny all;
    }

    location ~* ^/(?:upload|upload_caster|download)/.*\.php$ {
        deny all;
    }

    location ~* /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass php_backend;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|ttf|woff|woff2|map)$ {
        expires 30d;
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }
}
